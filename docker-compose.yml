services:
  postgres:
    image: postgres:16-alpine
    container_name: alter-test-db
    environment:
      POSTGRES_USER: alter
      POSTGRES_PASSWORD: alter
      POSTGRES_DB: alter_test
    ports:
      - "5433:5432"
    volumes:
      - alter-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alter"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  alter-pgdata:
